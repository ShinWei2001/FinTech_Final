<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart-E Robo | 分析儀表板</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap');

  :root {
    --navy:    #1e2d45;
    --navy2:   #263852;
    --blue:    #3b6ea5;
    --accent:  #4d9de0;
    --gold:    #c9a84c;
    --light:   #f4f7fb;
    --white:   #ffffff;
    --text:    #1e2d45;
    --muted:   #7a8fa6;
    --border:  #dce6f0;
    --pass:    #2d9e6b;
    --fail:    #c0392b;
    --stock:   #3b6ea5;
    --bond:    #c9a84c;
    --other:   #2d9e6b;
    --radius:  12px;
    --shadow:  0 2px 16px rgba(30,45,69,.10);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--light);
    color: var(--text);
    line-height: 1.6;
  }

  /* ── Header ── */
  header {
    background: var(--navy);
    padding: 0 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,.25);
  }
  .logo { color: var(--white); font-family: 'DM Serif Display', serif; font-size: 1.35rem; letter-spacing: .5px; }
  .logo span { color: var(--accent); }
  .updated { color: var(--muted); font-size: .78rem; }

  /* ── Layout ── */
  main { max-width: 1280px; margin: 0 auto; padding: 32px 24px 60px; }

  /* ── Section titles ── */
  .section-title {
    font-family: 'DM Serif Display', serif;
    font-size: 1.4rem;
    color: var(--navy);
    margin-bottom: 20px;
    padding-bottom: 10px;
    border-bottom: 2px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-title .badge {
    background: var(--navy); color: var(--white);
    font-family: 'DM Sans', sans-serif;
    font-size: .72rem; font-weight: 600;
    padding: 2px 10px; border-radius: 20px;
  }
  section { margin-bottom: 48px; }

  /* ── Stat cards ── */
  .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 32px; }
  .stat-card {
    background: var(--white);
    border-radius: var(--radius);
    padding: 20px 24px;
    box-shadow: var(--shadow);
    border-top: 3px solid var(--accent);
  }
  .stat-card .label { font-size: .75rem; font-weight: 600; color: var(--muted); letter-spacing: .8px; text-transform: uppercase; }
  .stat-card .value { font-size: 1.9rem; font-weight: 600; color: var(--navy); margin-top: 4px; }
  .stat-card .sub   { font-size: .8rem; color: var(--muted); margin-top: 2px; }

  /* ── Panel ── */
  .panel {
    background: var(--white);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 28px 32px;
    margin-bottom: 24px;
  }
  .panel-title { font-weight: 600; font-size: .95rem; color: var(--navy); margin-bottom: 16px; }

  /* ── Metrics comparison ── */
  .metrics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .metric-block { border-radius: 10px; padding: 20px 24px; }
  .metric-block.smart { background: linear-gradient(135deg, var(--navy), var(--navy2)); color: var(--white); }
  .metric-block.equal { background: var(--light); border: 1px solid var(--border); }
  .metric-block .mb-label { font-size: .7rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; opacity: .7; margin-bottom: 12px; }
  .metric-block.smart .mb-label { color: var(--accent); opacity: 1; }
  .metric-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px; }
  .metric-row .mk { font-size: .82rem; opacity: .8; }
  .metric-row .mv { font-size: 1.1rem; font-weight: 600; }
  .metric-block.smart .mk, .metric-block.smart .mv { color: var(--white); }

  /* ── Table ── */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: .84rem; }
  thead th {
    background: var(--navy);
    color: var(--white);
    padding: 10px 14px;
    text-align: left;
    font-weight: 600;
    font-size: .75rem;
    letter-spacing: .5px;
    white-space: nowrap;
  }
  thead th:first-child { border-radius: 8px 0 0 0; }
  thead th:last-child  { border-radius: 0 8px 0 0; }
  tbody tr { border-bottom: 1px solid var(--border); transition: background .15s; }
  tbody tr:hover { background: #f0f6ff; }
  tbody td { padding: 9px 14px; white-space: nowrap; }
  tbody tr:last-child td:first-child { border-radius: 0 0 0 8px; }
  tbody tr:last-child td:last-child  { border-radius: 0 0 8px 0; }

  /* ── Category pill ── */
  .cat { display:inline-block; padding:2px 9px; border-radius:20px; font-size:.72rem; font-weight:600; }
  .cat-stock { background:#e8f0fa; color:var(--stock); }
  .cat-bond  { background:#fdf3db; color:#a07a10; }
  .cat-other { background:#e4f5ed; color:var(--other); }

  /* ── Score bar ── */
  .score-bar-wrap { display:flex; align-items:center; gap:8px; }
  .score-bar { height:7px; border-radius:4px; background:var(--border); flex:1; overflow:hidden; }
  .score-fill { height:100%; border-radius:4px; background:linear-gradient(90deg,var(--blue),var(--accent)); }
  .score-num { font-size:.8rem; font-weight:600; color:var(--navy); min-width:34px; text-align:right; }

  /* ── Weight badge ── */
  .wt-pill { display:inline-block; padding:3px 11px; border-radius:20px; background:var(--navy); color:var(--white); font-size:.8rem; font-weight:600; }

  /* ── Pool rank badge ── */
  .rank-num { display:inline-flex; align-items:center; justify-content:center; width:26px; height:26px; border-radius:50%; font-size:.78rem; font-weight:700; }
  .rank-1 { background:var(--gold); color:#fff; }
  .rank-2 { background:#b0bec5; color:#fff; }
  .rank-3 { background:#a0522d; color:#fff; }
  .rank-other { background:var(--border); color:var(--navy); }

  /* ── Slot bar ── */
  .slot-bar-row { display:flex; align-items:center; gap:12px; margin-bottom:10px; }
  .slot-label { width:56px; font-size:.8rem; font-weight:600; }
  .slot-bar { flex:1; height:10px; border-radius:5px; overflow:hidden; background:var(--border); }
  .slot-fill-stock { height:100%; border-radius:5px; background:var(--stock); }
  .slot-fill-bond  { height:100%; border-radius:5px; background:var(--bond); }
  .slot-fill-other { height:100%; border-radius:5px; background:var(--other); }
  .slot-count { font-size:.82rem; color:var(--muted); width:80px; }

  /* ── Chart containers ── */
  .chart-grid { display:grid; grid-template-columns:1fr 1fr; gap:24px; }
  .chart-box { background:var(--white); border-radius:var(--radius); box-shadow:var(--shadow); padding:24px; }
  .chart-box.full { grid-column:1/-1; }
  .chart-label { font-size:.82rem; font-weight:600; color:var(--muted); margin-bottom:14px; }

  /* ── Legend dots ── */
  .legend { display:flex; gap:20px; margin-bottom:12px; flex-wrap:wrap; }
  .legend-item { display:flex; align-items:center; gap:6px; font-size:.8rem; }
  .dot { width:10px; height:10px; border-radius:50%; }

  /* ── Loading ── */
  #loading { text-align:center; padding:80px 0; color:var(--muted); font-size:1rem; }
  .spinner { display:inline-block; width:36px; height:36px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 1s linear infinite; margin-bottom:16px; }
  @keyframes spin { to { transform:rotate(360deg); } }

  /* ── Responsive ── */
  @media(max-width:768px) {
    main { padding:16px 12px 40px; }
    .metrics-grid, .chart-grid { grid-template-columns:1fr; }
    header { padding:0 16px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">Smart<span>-E</span> Robo</div>
  <div class="updated" id="updated-at">載入中...</div>
</header>

<main>
  <div id="loading">
    <div class="spinner"></div><br>正在載入分析資料...
  </div>
  <div id="content" style="display:none">

    <!-- ① 整體概覽 -->
    <section>
      <div class="section-title">整體概覽 <span class="badge">OVERVIEW</span></div>
      <div class="stat-grid" id="stat-grid"></div>
    </section>

    <!-- ② Stage 0：市值預篩 -->
    <section>
      <div class="section-title">Stage 0 — 市值預篩 <span class="badge">318 → 100 檔</span></div>
      <div class="panel">
        <div class="panel-title">各類型名額分配（按市值比例，每類至少 10 檔）</div>
        <div id="slots-viz"></div>
      </div>
    </section>

    <!-- ③ Stage 1：評分排行榜 -->
    <section>
      <div class="section-title">Stage 1 — 量化評分排行 <span class="badge">100 檔</span></div>
      <div class="panel">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px;">
          <div class="panel-title" style="margin:0">綜合評分排行（ADV + 主動風險 + 費用率）</div>
          <div style="display:flex;gap:8px;flex-wrap:wrap;">
            <button class="filter-btn active" data-cat="all">全部</button>
            <button class="filter-btn" data-cat="stock">股票型</button>
            <button class="filter-btn" data-cat="bond">債券型</button>
            <button class="filter-btn" data-cat="other">其他型</button>
          </div>
        </div>
        <div class="table-wrap">
          <table id="score-table">
            <thead>
              <tr>
                <th>#</th><th>代碼</th><th>類型</th><th>市值(億)</th>
                <th>ADV分</th><th>風險分</th><th>費用分</th>
                <th>總分</th><th>進優選池</th>
              </tr>
            </thead>
            <tbody id="score-tbody"></tbody>
          </table>
        </div>
      </div>
    </section>

    <!-- ④ Stage 2：優選池 -->
    <section>
      <div class="section-title">Stage 2 — 優選池 <span class="badge">前 10 檔</span></div>
      <div class="panel">
        <div class="panel-title">MVO 最佳化投資組合（最大夏普比率）</div>
        <div id="elite-cards" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;margin-bottom:28px;"></div>
        <div class="chart-grid">
          <div class="chart-box">
            <div class="chart-label">📊 MVO 配置權重</div>
            <canvas id="weight-chart" height="220"></canvas>
          </div>
          <div class="chart-box">
            <div class="chart-label">⚡ 效率前緣（Monte Carlo）</div>
            <canvas id="frontier-chart" height="220"></canvas>
          </div>
        </div>
      </div>
    </section>

    <!-- ⑤ 回測 -->
    <section>
      <div class="section-title">回測績效 <span class="badge">Smart-E vs 100檔等權</span></div>
      <div class="metrics-grid" id="metrics-grid" style="margin-bottom:24px;"></div>
      <div class="chart-box full" style="background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);padding:24px;">
        <div class="legend" id="bt-legend"></div>
        <canvas id="backtest-chart" height="120"></canvas>
      </div>
    </section>

  </div><!-- #content -->
</main>

<script>
// ── 工具 ──────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const pct = v => (v * 100).toFixed(1) + '%';
const fmt2 = v => Number(v).toFixed(2);
const fmtADV = v => v >= 10000 ? (v/10000).toFixed(1)+'萬' : Math.round(v).toLocaleString();

const CAT_LABEL = { stock:'股票型', bond:'債券型', other:'其他型' };
const CAT_COLOR = { stock:'#3b6ea5', bond:'#c9a84c', other:'#2d9e6b' };

// ── 主流程 ────────────────────────────────────────────────────
async function init() {
  let data;
  try {
    const res = await fetch('data/results.json');
    if (!res.ok) throw new Error('無法載入 results.json');
    data = await res.json();
  } catch(e) {
    $('loading').innerHTML = `<p style="color:#c0392b">⚠️ 資料載入失敗：${e.message}<br>
      請先執行 pipeline.py 產生 docs/data/results.json</p>`;
    return;
  }

  $('loading').style.display = 'none';
  $('content').style.display = 'block';
  $('updated-at').textContent = '更新：' + data.generated_at.slice(0,10);

  renderOverview(data);
  renderStage0(data);
  renderStage1(data);
  renderStage2(data);
  renderBacktest(data);
}

// ── ① 概覽 ────────────────────────────────────────────────────
function renderOverview(data) {
  const mvo = data.stage2.mvo;
  const bt  = data.backtest.metrics;
  const cards = [
    { label:'評分 ETF 數', value: data.stage1.scored_count, sub:'Stage 1 有效資料' },
    { label:'優選池', value: data.stage2.elite_pool.length + ' 檔', sub:'前 10% 精選' },
    { label:'預期年報酬', value: pct(mvo.expected_return), sub:'MVO 最佳化' },
    { label:'夏普比率', value: fmt2(mvo.sharpe), sub:'Smart-E 投組' },
    { label:'Smart-E 累積報酬', value: pct(bt.smart_e.cumulative_return), sub:'vs 等權 ' + pct(bt.equal_weight_100.cumulative_return) },
    { label:'最大回檔(MDD)', value: pct(bt.smart_e.max_drawdown), sub:'Smart-E' },
  ];
  $('stat-grid').innerHTML = cards.map(c => `
    <div class="stat-card">
      <div class="label">${c.label}</div>
      <div class="value">${c.value}</div>
      <div class="sub">${c.sub}</div>
    </div>`).join('');
}

// ── ② Stage 0 ─────────────────────────────────────────────────
function renderStage0(data) {
  const slots = data.stage0.slots;
  const total = 100;
  const rows = [
    { cat:'stock', label:'股票型', n: slots.stock },
    { cat:'bond',  label:'債券型', n: slots.bond  },
    { cat:'other', label:'其他型', n: slots.other },
  ];
  $('slots-viz').innerHTML = rows.map(r => `
    <div class="slot-bar-row">
      <div class="slot-label"><span class="cat cat-${r.cat}">${r.label}</span></div>
      <div class="slot-bar"><div class="slot-fill-${r.cat}" style="width:${r.n}%"></div></div>
      <div class="slot-count">${r.n} 檔 / ${(r.n/total*100).toFixed(0)}%</div>
    </div>`).join('');
}

// ── ③ Stage 1 評分表 ──────────────────────────────────────────
let allScores = [];
function renderStage1(data) {
  allScores = data.stage1.all_scores;
  renderScoreTable('all');

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderScoreTable(btn.dataset.cat);
    });
  });
}

function renderScoreTable(cat) {
  const rows = cat === 'all' ? allScores : allScores.filter(r => r.category === cat);
  const eliteSet = new Set(
    (window._elitePool || []).map(e => e.ticker)
  );
  $('score-tbody').innerHTML = rows.map(r => {
    const inPool = eliteSet.has(r.ticker);
    const rankClass = ['rank-1','rank-2','rank-3'][r.score_rank-1] || 'rank-other';
    return `<tr>
      <td><span class="rank-num ${rankClass}">${r.score_rank}</span></td>
      <td><strong>${r.ticker}</strong></td>
      <td><span class="cat cat-${r.category}">${CAT_LABEL[r.category]}</span></td>
      <td>${r.mktcap?.toFixed(0) ?? '-'}</td>
      <td>${scoreBar(r.score_adv)}</td>
      <td>${scoreBar(r.score_risk)}</td>
      <td>${scoreBar(r.score_cost)}</td>
      <td>${scoreBar(r.total_score, true)}</td>
      <td style="text-align:center">${inPool ? '✅' : '—'}</td>
    </tr>`;
  }).join('');
}

function scoreBar(val, bold=false) {
  const pct = Math.min(Math.max(val||0, 0), 100);
  return `<div class="score-bar-wrap">
    <div class="score-bar"><div class="score-fill" style="width:${pct}%"></div></div>
    <div class="score-num" ${bold?'style="font-weight:700"':''}>${pct.toFixed(0)}</div>
  </div>`;
}

// ── ④ Stage 2 優選池 ──────────────────────────────────────────
function renderStage2(data) {
  const elite = data.stage2.elite_pool;
  const mvo   = data.stage2.mvo;
  window._elitePool = elite;

  // 卡片
  $('elite-cards').innerHTML = elite.map(e => {
    const wt = mvo.weights[e.ticker] || 0;
    return `<div style="background:var(--light);border-radius:10px;padding:16px 18px;border-left:4px solid ${CAT_COLOR[e.category]}">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
        <strong style="font-size:1rem">${e.ticker}</strong>
        <span class="wt-pill">${(wt*100).toFixed(1)}%</span>
      </div>
      <div style="margin-bottom:4px"><span class="cat cat-${e.category}">${CAT_LABEL[e.category]}</span></div>
      <div style="font-size:.78rem;color:var(--muted);margin-top:6px">
        總分 <strong>${e.total_score?.toFixed(1)}</strong> ｜
        費用率 <strong>${e.cost}%</strong> ｜
        市值 <strong>${e.mktcap?.toFixed(0)}億</strong>
      </div>
    </div>`;
  }).join('');

  // 圓餅圖（權重）
  const wtLabels = Object.keys(mvo.weights);
  const wtVals   = Object.values(mvo.weights).map(v => (v*100).toFixed(2));
  const wtColors = wtLabels.map(t => {
    const cat = elite.find(e=>e.ticker===t)?.category || 'stock';
    return CAT_COLOR[cat];
  });

  new Chart($('weight-chart'), {
    type: 'doughnut',
    data: { labels: wtLabels, datasets: [{ data: wtVals, backgroundColor: wtColors, borderWidth: 2, borderColor: '#fff' }] },
    options: { plugins: { legend: { position:'right', labels:{ font:{size:11}, boxWidth:12 } } }, cutout:'55%' }
  });

  // 效率前緣散佈圖
  const frontier = mvo.frontier || [];
  const step = Math.max(1, Math.floor(frontier.length / 800));
  const pts  = frontier.filter((_,i) => i % step === 0);
  const vols = pts.map(p => p.vol * 100);
  const rets = pts.map(p => p.ret * 100);
  const sharpes = pts.map(p => p.sharpe);
  const minS = Math.min(...sharpes), maxS = Math.max(...sharpes);
  const colors = sharpes.map(s => {
    const t = (s - minS) / (maxS - minS + 1e-9);
    const r = Math.round(30 + t*(77-30));
    const g = Math.round(110 + t*(158-110));
    const b = Math.round(165 + t*(224-165));
    return `rgba(${r},${g},${b},0.65)`;
  });
  // 標記最佳點
  const optVol = mvo.volatility * 100;
  const optRet = mvo.expected_return * 100;

  new Chart($('frontier-chart'), {
    type: 'scatter',
    data: {
      datasets: [
        { label:'模擬投組', data: vols.map((v,i)=>({x:v,y:rets[i]})),
          backgroundColor: colors, pointRadius: 2.5, pointHoverRadius: 4 },
        { label:'最佳夏普', data: [{x:optVol, y:optRet}],
          backgroundColor: '#e74c3c', pointRadius: 8, pointStyle:'star' }
      ]
    },
    options: {
      plugins: { legend:{ labels:{ font:{size:11}, boxWidth:12 } } },
      scales: {
        x: { title:{ display:true, text:'年化波動率 (%)', font:{size:11} } },
        y: { title:{ display:true, text:'年化報酬率 (%)', font:{size:11} } }
      }
    }
  });
}

// ── ⑤ 回測 ───────────────────────────────────────────────────
function renderBacktest(data) {
  const bt = data.backtest;
  const ms = bt.metrics.smart_e;
  const me = bt.metrics.equal_weight_100;

  $('metrics-grid').innerHTML = `
    <div class="metric-block smart">
      <div class="mb-label">🏆 Smart-E Robo（優選10檔）</div>
      <div class="metric-row"><span class="mk">累積報酬</span><span class="mv">${pct(ms.cumulative_return)}</span></div>
      <div class="metric-row"><span class="mk">最大回檔</span><span class="mv">${pct(ms.max_drawdown)}</span></div>
      <div class="metric-row"><span class="mk">夏普比率</span><span class="mv">${fmt2(ms.sharpe)}</span></div>
    </div>
    <div class="metric-block equal">
      <div class="mb-label" style="color:var(--muted)">等權組合（100 檔）</div>
      <div class="metric-row"><span class="mk">累積報酬</span><span class="mv">${pct(me.cumulative_return)}</span></div>
      <div class="metric-row"><span class="mk">最大回檔</span><span class="mv">${pct(me.max_drawdown)}</span></div>
      <div class="metric-row"><span class="mk">夏普比率</span><span class="mv">${fmt2(me.sharpe)}</span></div>
    </div>`;

  $('bt-legend').innerHTML = `
    <div class="legend-item"><div class="dot" style="background:#1e2d45"></div>Smart-E Robo</div>
    <div class="legend-item"><div class="dot" style="background:#aab7c4"></div>100 檔等權</div>`;

  // 降採樣（最多 300 點）
  const dates = bt.dates || [];
  const smart = bt.smart_e || [];
  const equal = bt.equal_weight || [];
  const step  = Math.max(1, Math.floor(dates.length / 300));
  const dSub  = dates.filter((_,i) => i % step === 0 || i === dates.length-1);
  const sSub  = smart.filter((_,i) => i % step === 0 || i === smart.length-1);
  const eSub  = equal.filter((_,i) => i % step === 0 || i === equal.length-1);

  new Chart($('backtest-chart'), {
    type: 'line',
    data: {
      labels: dSub,
      datasets: [
        { label:'Smart-E Robo', data: sSub, borderColor:'#1e2d45', backgroundColor:'rgba(30,45,69,.08)',
          borderWidth: 2.2, pointRadius: 0, fill: true, tension: 0.3 },
        { label:'100檔等權', data: eSub, borderColor:'#aab7c4', backgroundColor:'transparent',
          borderWidth: 1.5, pointRadius: 0, borderDash:[6,4], tension: 0.3 }
      ]
    },
    options: {
      plugins: { legend:{ display:false } },
      scales: {
        x: { ticks:{ maxTicksLimit:8, font:{size:10} }, grid:{ display:false } },
        y: { ticks:{ font:{size:10}, callback: v => v.toFixed(2)+'x' }, grid:{ color:'rgba(0,0,0,.05)' } }
      },
      interaction: { mode:'index', intersect:false }
    }
  });
}

// ── Filter button style ──
document.head.insertAdjacentHTML('beforeend', `<style>
  .filter-btn {
    border:1.5px solid var(--border); background:var(--white);
    color:var(--navy); padding:5px 14px; border-radius:20px;
    font-size:.78rem; font-weight:600; cursor:pointer; transition:.15s;
  }
  .filter-btn:hover { border-color:var(--accent); color:var(--accent); }
  .filter-btn.active { background:var(--navy); color:var(--white); border-color:var(--navy); }
</style>`);

init();
</script>
</body>
</html>
